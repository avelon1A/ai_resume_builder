ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.airesumebuilder.ApplicationKt.module ]
    }
}

database {
    driver = "org.h2.Driver"
    driver = ${?DB_DRIVER}
    jdbcURL = "jdbc:h2:mem:resumeBuilder;DB_CLOSE_DELAY=-1"
    jdbcURL = ${?DB_URL}
    user = ""
    user = ${?DB_USER}
    password = ""
    password = ${?DB_PASSWORD}
}

openai {
    apiKey = ""
    apiKey = ${?OPENAI_API_KEY}
}

jwt {
    secret = "ai-resume-builder-jwt-secret-change-in-production"
    secret = ${?JWT_SECRET}
}
